name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Make Gradle executable
      run: chmod +x gradlew
    
    - name: Prüfe Projekt-Struktur
      run: |
        echo "=== Projekt-Struktur ==="
        ls -la
        echo "=== App-Verzeichnis ==="
        ls -la app/ || echo "app/ existiert nicht!"
        echo "=== build.gradle ==="
        cat app/build.gradle || echo "app/build.gradle existiert nicht!"
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
    
    - name: Prüfe ob APK existiert
      run: |
        echo "=== Suche nach APK ==="
        find . -name "*.apk" || echo "Keine APK gefunden!"
        ls -la app/build/outputs/apk/debug/ || echo "APK nicht gefunden!"
    
    - name: Upload Debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Lidl-refill-debug
        path: app/build/outputs/apk/debug/app-debug.apk
