name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Code auschecken
      uses: actions/checkout@v4
      
    - name: ☕ JDK 17 installieren
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: 📱 Android SDK einrichten
      uses: android-actions/setup-android@v3
      
    - name: 🔧 Gradle ausführbar machen
      run: chmod +x gradlew
      
    - name: 🔨 Debug APK bauen
      run: ./gradlew assembleDebug
      
    - name: 🔨 Release APK bauen
      run: ./gradlew assembleRelease
      
    - name: 📤 Debug APK hochladen
      uses: actions/upload-artifact@v4
      with:
        name: LidlRefill-Debug
        path: app/build/outputs/apk/debug/*.apk
        
    - name: 📤 Release APK hochladen
      uses: actions/upload-artifact@v4
      with:
        name: LidlRefill-Release
        path: app/build/outputs/apk/release/*.apk
